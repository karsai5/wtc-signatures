<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WTC Email Signature Generator</title>
<style>
  :root {
    --bg: #f4f4f4;
    --panel: #ffffff;
    --border: #dddddd;
    --accent: #222222;
    --muted: #666666;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--accent);
    padding: 24px;
  }
  h1 { margin-top: 0; font-size: 22px; }
  h2 { font-size: 16px; margin: 0 0 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin: 12px 0 4px;
  }
  input[type="text"], input[type="url"], input[type="tel"], input[type="number"] {
    width: 100%;
    padding: 8px 10px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
  }
  input:focus { outline: 2px solid #5b9dd9; border-color: #5b9dd9; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  .preview-frame {
    border: 1px dashed var(--border);
    padding: 16px;
    background: #fff;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  textarea {
    width: 100%;
    height: 200px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    resize: vertical;
  }
  .buttons { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  button {
    padding: 8px 14px;
    font-size: 14px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  button.secondary {
    background: #fff;
    color: var(--accent);
  }
  button:hover { opacity: 0.85; }
  .toast {
    display: inline-block;
    margin-left: 8px;
    font-size: 13px;
    color: #2a7a2a;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>

<div class="layout">

  <div class="panel">
    <h1>Signature Generator</h1>
    <h2>Edit your details</h2>

    <label for="name">Full name</label>
    <input type="text" id="name" value="Linus Karsai">

    <label for="pronouns">Pronouns</label>
    <input type="text" id="pronouns" value="he/him">

    <label for="company">Company</label>
    <input type="text" id="company" value="Willoughby Theatre Company">

    <label for="role">Role / Title</label>
    <input type="text" id="role" value="Technical Director">

    <label for="phone">Phone (display)</label>
    <input type="tel" id="phone" value="0400 000 000">

    <label for="phoneLink">Phone (tel: link, international format)</label>
    <input type="tel" id="phoneLink" value="+61400000000">

    <label for="tagline">Tagline / footer line</label>
    <input type="text" id="tagline" value="~ Respectfully making theatre on Gadigal land ~">

    <label for="logoUrl">Logo URL</label>
    <input type="url" id="logoUrl" value="https://REPLACE-WITH-HOSTED-URL/wtc-logo-circ-rev-black.png">
    <div class="hint">Must be a publicly accessible image URL for emails to render the logo.</div>

    <label for="logoSize">Logo size (px)</label>
    <input type="number" id="logoSize" value="90" min="40" max="200">
  </div>

  <div class="panel">
    <h2>Live preview</h2>
    <div class="preview-frame" id="preview"></div>

    <div class="buttons">
      <button id="copyRich">Copy signature (rich)</button>
      <button class="secondary" id="copyHtml">Copy HTML source</button>
      <span class="toast" id="toast">Copied!</span>
    </div>

    <h2 style="margin-top: 20px;">HTML source</h2>
    <textarea id="htmlSource" readonly></textarea>
    <div class="hint">Paste the rich copy directly into Gmail/Outlook/Apple Mail signature settings. Use the HTML source if your client accepts raw HTML.</div>
  </div>

</div>

<script>
  const fields = ["name","pronouns","company","role","phone","phoneLink","tagline","logoUrl","logoSize"];
  const $ = id => document.getElementById(id);

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  function buildSignature() {
    const name     = escapeHtml($("name").value);
    const pronouns = escapeHtml($("pronouns").value);
    const company  = escapeHtml($("company").value);
    const role     = escapeHtml($("role").value);
    const phone    = escapeHtml($("phone").value);
    const phoneLink= escapeHtml($("phoneLink").value);
    const tagline  = escapeHtml($("tagline").value);
    const logoUrl  = escapeHtml($("logoUrl").value);
    const logoSize = parseInt($("logoSize").value, 10) || 90;

    const pronounsHtml = pronouns
      ? ` <span style="font-weight: normal; color: #666666;">(${pronouns})</span>`
      : "";

    const taglineHtml = tagline
      ? `<div style="margin-top: 8px; font-style: italic; color: #666666; font-size: 12px;">${tagline}</div>`
      : "";

    return `<table cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, Helvetica, sans-serif; color: #222222; font-size: 14px; line-height: 1.4;">
  <tr>
    <td style="vertical-align: middle; padding-right: 16px;">
      <img src="${logoUrl}" alt="${company}" width="${logoSize}" height="${logoSize}" style="display: block; width: ${logoSize}px; height: ${logoSize}px; border: 0; outline: none; text-decoration: none;">
    </td>
    <td style="vertical-align: middle; border-left: 2px solid #222222; padding-left: 16px;">
      <div style="font-size: 15px; font-weight: bold; color: #222222;">${name}${pronounsHtml}</div>
      <div style="margin-top: 6px; color: #222222;">
        <strong>${company}</strong><br>
        ${role}<br>
        <a href="tel:${phoneLink}" style="color: #222222; text-decoration: none;">${phone}</a>
      </div>
      ${taglineHtml}
    </td>
  </tr>
</table>`;
  }

  function render() {
    const html = buildSignature();
    $("preview").innerHTML = html;
    $("htmlSource").value = html;
  }

  fields.forEach(id => $(id).addEventListener("input", render));
  render();

  function showToast() {
    const t = $("toast");
    t.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.remove("show"), 1500);
  }

  $("copyHtml").addEventListener("click", async () => {
    await navigator.clipboard.writeText($("htmlSource").value);
    showToast();
  });

  $("copyRich").addEventListener("click", async () => {
    const html = buildSignature();
    // Strip tags for the plain-text fallback
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    const text = tmp.innerText;
    try {
      await navigator.clipboard.write([
        new ClipboardItem({
          "text/html": new Blob([html], { type: "text/html" }),
          "text/plain": new Blob([text], { type: "text/plain" })
        })
      ]);
      showToast();
    } catch (e) {
      // Fallback: select the rendered preview and execCommand copy
      const range = document.createRange();
      range.selectNodeContents($("preview"));
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      document.execCommand("copy");
      sel.removeAllRanges();
      showToast();
    }
  });
</script>

</body>
</html>
